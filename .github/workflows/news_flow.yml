name: 美股信息流推送

on:
  schedule:
    # 这个定时只是"看门狗": 万一常驻进程结束了, 用它把任务重新拉起来。
    # 真正的每分钟检查靠下面的常驻循环(单次最长约 5.5 小时)。
    - cron: "*/5 * * * *"
  workflow_dispatch:   # 允许手动点击运行(方便测试)

concurrency:
  group: news-flow
  # 常驻单实例: 新的触发会接替正在跑的那个, 避免堆积, 保证一直有一个在跑。
  cancel-in-progress: true

permissions:
  contents: write      # 允许把去重记录提交回仓库

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install feedparser requests yfinance

      - name: "常驻运行(每分钟一遍, 单次最长约 5.5 小时)— 新闻 + 暴力拉升"
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 只有"真的推送了"时, 脚本会写出 .need_commit, 这里才把去重/状态提交回仓库。
          # 这样既能避免重复推送, 又不会每分钟都提交把仓库撑大。
          commit_if_dirty () {
            if [ -f .need_commit ]; then
              rm -f .need_commit
              git add seen_news.json movers_state.json 2>/dev/null || true
              git commit -q -m "update state [skip ci]" 2>/dev/null || true
              git pull --rebase -q origin main 2>/dev/null || true
              git push -q 2>/dev/null || true
            fi
          }
          # 常驻约 5 小时 40 分(留在 GitHub 6 小时硬上限内); 结束后由定时"看门狗"重新拉起。
          # 新闻每 ~15 秒查一遍(求时效); 行情暴力拉升每 4 圈(约 60 秒)查一遍,
          # 避免 Yahoo 高频抓取被限流封 IP(行情本来就是 1 分钟 K 线, 查更勤无意义)。
          end=$((SECONDS + 20400))
          i=0
          while [ $SECONDS -lt $end ]; do
            python news_flow.py || true
            commit_if_dirty
            if [ $((i % 4)) -eq 0 ]; then
              python market_movers.py || true
              commit_if_dirty
            fi
            i=$((i + 1))
            sleep 15
          done
